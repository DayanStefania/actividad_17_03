<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi primera página </title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            margin: 0;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        section {
            background-color: white;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            margin: 0;
        }

        img {
            width: 200px;
            border-radius: 10px;
        }

        a {
            color: blue;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #ddd;
        }
    </style>
</head>

<body>

    <header>
        <h1>Hola Mundo!!!</h1>
        <p>Bienvenido a mi sitio</p>
    </header>

    <section>
        <h2>Sobre mí</h2>
        <p>Hola, mi nombre es Dayane Palma</p>
        <p>Me gusta Domir, comer y leer </p>
    </section>

    <section>
        <h2>Mi imagen</h2>
        <img src="https://media.istockphoto.com/id/1411701868/es/foto/magic-book-with-glitter-libro-abierto-con-luces-que-brillan-en-el-fondo-oscuro.jpg?s=612x612&w=0&k=20&c=SHpdYT20NIlRE1-y5Jj7ETWtj6zU9k2IwviLFJ2oRsA=" alt="Imagen de ejemplo">
    </section>

    <section>
        <h2>Mis enlaces</h2>
        <p>Visita mi página favorita:</p>
        <a href="https://www.tiktok.com/" target="_blank">Ir a TikTok</a>
    </section>

    <footer>
        <p>Creado por estudiante</p>
    </footer>

</body>
</html>
